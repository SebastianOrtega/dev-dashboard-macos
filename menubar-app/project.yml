name: DevDashboardMenuBar
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    PRODUCT_NAME: "Dev Dashboard"
    PRODUCT_BUNDLE_IDENTIFIER: com.local.dev-dashboard-menubar
    PRODUCT_DISPLAY_NAME: Dev Dashboard
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
    INFOPLIST_KEY_CFBundleDisplayName: Dev Dashboard
    INFOPLIST_KEY_NSPrincipalClass: NSApplication
    SWIFT_VERSION: 6.0
targets:
  DevDashboardMenuBar:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - sdk: ServiceManagement.framework
    settings:
      base:
        PRODUCT_MODULE_NAME: DevDashboardMenuBar
schemes:
  DevDashboardMenuBar:
    build:
      targets:
        DevDashboardMenuBar: all
    run:
      config: Debug
    archive:
      config: Release
